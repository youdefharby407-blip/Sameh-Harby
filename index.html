<!DOCTYPE html>

  <meta charset="UTF-8">

  <title>Sameh Harby | Contact</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255,215,0,0.3);
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(40px);}
      to {opacity:1; transform: translateY(0);}
    }

    /* Logo */
    .logo {
      width: 120px;
      margin-bottom: 15px;
      filter: drop-shadow(0 0 10px gold);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from {filter: drop-shadow(0 0 5px gold);}
      to {filter: drop-shadow(0 0 20px gold);}
    }

    /* Profile */
    .profile {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid gold;
      margin: 15px auto;
      transition: 0.4s;
      box-shadow: 0 0 15px gold;
    }

    .profile:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px gold, 0 0 60px rgba(255,215,0,0.6);
    }

    h2 {
      margin: 10px 0;
      color: gold;
    }

    .btn {
      display: block;
      margin: 10px 0;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.1);
      border: 1px solid gold;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: gold;
      color: black;
      box-shadow: 0 0 20px gold, 0 0 40px rgba(255,215,0,0.6);
      transform: translateY(-3px);
    }

    .btn::before {
      content: "";
      position: absolute;
      width: 0;
      height: 100%;
      left: 0;
      top: 0;
      background: rgba(255,255,255,0.2);
      transition: 0.4s;
    }

    .btn:hover::before {
      width: 100%;
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #aaa;
    }

    @media (max-width: 500px) {
      .container {
        padding: 20px;
      }
    }
.container {
  position: relative;
  z-index: 1;
}

    body {
  background: url("logo.jpg") no-repeat center center/cover;
  min-height: 100vh;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  top: 0;
  left: 0;
  z-index: 0;
}
  </style>
</head>
